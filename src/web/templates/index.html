<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Software Lifeform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      height: 100dvh;
      background: #000;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Atom centerpiece */
    .centerpiece {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(360px, 85vw);
      height: min(360px, 85vw);
      perspective: 750px;
      pointer-events: none;
      z-index: 0;
    }

    .atom {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: atomSpin 24s linear infinite;
    }

    /* Nucleus (protons) */
    .nucleus {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 36px;
      height: 36px;
      margin: -18px 0 0 -18px;
      background: radial-gradient(circle at 30% 30%, rgba(200, 220, 255, 0.95), rgba(80, 120, 200, 0.8));
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(100, 160, 255, 0.7), 0 0 40px rgba(80, 120, 255, 0.4);
      animation: nucleusPulse 2.5s ease-in-out infinite;
    }

    /* Orbital rings (electron shells) */
    .orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 50%;
      transform-style: preserve-3d;
    }

    .orbit-1 {
      width: 180px;
      height: 180px;
      margin: -90px 0 0 -90px;
      transform: rotateX(70deg) rotateZ(0deg);
      animation: orbitRotate1 8s linear infinite;
    }

    .orbit-2 {
      width: 255px;
      height: 255px;
      margin: -128px 0 0 -128px;
      transform: rotateY(60deg) rotateX(70deg) rotateZ(0deg);
      border-color: rgba(150, 120, 255, 0.35);
      animation: orbitRotate2 12s linear infinite reverse;
    }

    .orbit-3 {
      width: 300px;
      height: 300px;
      margin: -150px 0 0 -150px;
      transform: rotateY(120deg) rotateX(70deg) rotateZ(0deg);
      border-color: rgba(100, 220, 200, 0.3);
      animation: orbitRotate3 16s linear infinite;
    }

    /* Electrons */
    .electron {
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, rgba(150, 220, 255, 1), rgba(80, 150, 255, 0.8));
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(100, 200, 255, 0.9), 0 0 36px rgba(80, 180, 255, 0.5);
      top: -6px;
      left: 50%;
      margin-left: -6px;
    }

    .orbit-2 .electron {
      width: 9px;
      height: 9px;
      margin-left: -5px;
      top: -5px;
      background: radial-gradient(circle, rgba(180, 150, 255, 1), rgba(120, 100, 200, 0.8));
      box-shadow: 0 0 10px rgba(150, 120, 255, 0.8);
    }

    .orbit-3 .electron {
      width: 9px;
      height: 9px;
      margin-left: -5px;
      top: -5px;
      background: radial-gradient(circle, rgba(100, 255, 220, 1), rgba(80, 200, 180, 0.8));
      box-shadow: 0 0 10px rgba(100, 220, 200, 0.8);
    }

    .orbit-2 .electron:nth-child(2) {
      top: auto;
      bottom: -5px;
      left: 50%;
      margin-left: -5px;
    }

    .orbit-3 .electron:nth-child(2) {
      top: auto;
      bottom: -5px;
      left: 50%;
      margin-left: -5px;
    }

    @keyframes atomSpin {
      from { transform: rotateY(0deg) rotateX(10deg); }
      to { transform: rotateY(360deg) rotateX(10deg); }
    }

    @keyframes orbitRotate1 {
      from { transform: rotateX(70deg) rotateZ(0deg); }
      to { transform: rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes orbitRotate2 {
      from { transform: rotateY(60deg) rotateX(70deg) rotateZ(0deg); }
      to { transform: rotateY(60deg) rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes orbitRotate3 {
      from { transform: rotateY(120deg) rotateX(70deg) rotateZ(0deg); }
      to { transform: rotateY(120deg) rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes nucleusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.95; transform: scale(1.08); }
    }

    /* Messages - grow up from bottom */
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: scroll;
      padding: 2rem 1.5rem 1rem;
      padding-top: max(1rem, env(safe-area-inset-top));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 1rem;
      z-index: 1;
    }

    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(60, 60, 80, 0.8);
      border: 1px solid rgba(100, 150, 255, 0.3);
    }

    .msg.agent {
      align-self: flex-start;
      background: rgba(30, 50, 80, 0.6);
      border: 1px solid rgba(100, 200, 255, 0.2);
      color: #c0d8ff;
    }

    .narration {
      align-self: flex-start;
      max-width: 85%;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.6;
      background: rgba(20, 40, 60, 0.7);
      border: 1px solid rgba(80, 160, 255, 0.25);
      color: #90b8e8;
      font-family: inherit;
    }
    .narration .line {
      display: block;
      animation: fadeUp 0.25s ease;
    }

    .msg table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.85rem;
      margin: 0.5rem 0;
    }
    .msg th, .msg td {
      border: 1px solid rgba(100, 160, 255, 0.3);
      padding: 0.4rem 0.6rem;
      text-align: left;
    }
    .msg th {
      background: rgba(0, 40, 80, 0.5);
      font-weight: 600;
    }
    .msg tr:nth-child(even) { background: rgba(0, 20, 40, 0.2); }
    .msg h1, .msg h2, .msg h3 { margin: 0.75rem 0 0.25rem; }
    .msg ul, .msg ol { margin: 0.5rem 0; padding-left: 1.5rem; }

    /* Chat bar - fixed at bottom */
    .chat-bar {
      position: relative;
      z-index: 2;
      padding: 1rem 1.5rem 1.5rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .input-row input {
      flex: 1;
      background: rgba(20, 20, 30, 0.9);
      border: 1px solid rgba(80, 100, 140, 0.5);
      border-radius: 24px;
      padding: 0.85rem 1.25rem;
      min-height: 44px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 16px;
    }
    .input-row input:focus {
      outline: none;
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.1);
    }
    .input-row input::placeholder { color: #666; }

    .btn {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      min-height: 44px;
      min-width: 44px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-send {
      background: rgba(80, 140, 255, 0.4);
      color: #b0d0ff;
      border: 1px solid rgba(100, 160, 255, 0.4);
    }
    .btn-send:hover { background: rgba(80, 140, 255, 0.6); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .voice-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.75rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      margin-top: 0.75rem;
    }

    .btn-record {
      background: rgba(180, 60, 60, 0.4);
      color: #ffa0a0;
      border: 1px solid rgba(200, 80, 80, 0.5);
    }
    .btn-record:hover { background: rgba(180, 60, 60, 0.6); }
    .btn-record.recording {
      background: rgba(200, 50, 50, 0.7);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .btn-stop {
      background: rgba(80, 80, 90, 0.6);
      color: #aaa;
    }
    .btn-stop:hover { background: rgba(90, 90, 100, 0.7); }

    .status {
      font-size: 0.75rem;
      color: #666;
      margin-left: 0.5rem;
    }

    .toggles {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #666;
    }
    .toggle {
      width: 32px;
      height: 18px;
      background: rgba(60, 60, 80, 0.8);
      border-radius: 9px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle.on { background: rgba(80, 140, 255, 0.5); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(14px); }

    .tools-toggle, .memory-toggle {
      padding: 0.5rem 0.25rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    .tools-toggle {
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      margin-top: 0.5rem;
      text-decoration: underline;
    }
    .tools-toggle:hover { color: #999; }

    .tools-panel {
      display: none;
      background: rgba(10, 15, 25, 0.95);
      border: 1px solid rgba(80, 120, 180, 0.3);
      border-radius: 8px;
      padding: 1rem;
      margin: 0 1.5rem 1rem;
      max-height: 200px;
      overflow-y: auto;
      z-index: 3;
    }
    .tools-panel.open { display: block; }

    .tools-panel h4 {
      font-size: 0.8rem;
      color: #a0c0ff;
      margin-bottom: 0.5rem;
    }
    .tools-panel .tool-item {
      font-size: 0.8rem;
      padding: 0.4rem;
      background: rgba(0,20,40,0.5);
      border-radius: 4px;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .tools-panel .tool-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tools-panel .tool-btns { display: flex; gap: 0.3rem; }
    .tools-panel .tool-btns button {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(80,140,255,0.5);
      background: rgba(60,100,180,0.3);
      color: #a0c8ff;
      cursor: pointer;
    }
    .tools-panel .tool-btns button.reject { border-color: rgba(180,80,80,0.5); color: #ffa0a0; }
    .tools-panel .reload-btn {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      background: rgba(80,140,255,0.3);
      border: 1px solid rgba(100,160,255,0.4);
      color: #b0d0ff;
      border-radius: 4px;
      cursor: pointer;
    }

    .memory-toggle {
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      margin-top: 0.5rem;
      margin-left: 1rem;
      text-decoration: underline;
    }
    .memory-toggle:hover { color: #999; }

    .memory-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.98);
      z-index: 100;
      flex-direction: column;
    }
    .memory-panel.open {
      display: flex;
    }
    .memory-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid rgba(100, 180, 255, 0.2);
      flex-shrink: 0;
    }
    .memory-panel-header h3 {
      font-size: 1rem;
      color: #a0c8ff;
      margin: 0;
    }
    .memory-panel-close {
      background: rgba(80, 100, 140, 0.4);
      border: 1px solid rgba(100, 160, 255, 0.3);
      color: #b0d0ff;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
    }
    .memory-panel-close:hover {
      background: rgba(80, 100, 140, 0.6);
    }
    #memoryGraphContainer {
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .memory-node-modal {
      display: none;
      position: fixed;
      inset: 20%;
      background: rgba(15, 25, 45, 0.98);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      z-index: 101;
      overflow: hidden;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(0, 80, 180, 0.3);
    }
    .memory-node-modal.open {
      display: flex;
    }
    .memory-node-modal h4 {
      color: #a0c8ff;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }
    .memory-node-modal .content {
      flex: 1;
      overflow-y: auto;
      color: #c0d8f0;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .memory-node-modal .close-btn {
      margin-top: 1rem;
      padding: 0.4rem 0.8rem;
      min-height: 44px;
      background: rgba(80, 140, 255, 0.3);
      border: 1px solid rgba(100, 160, 255, 0.4);
      color: #b0d0ff;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      align-self: flex-start;
    }
    .notifications-toast {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      right: 1rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 340px;
    }
    .notifications-toast .toast {
      background: rgba(15, 25, 45, 0.98);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      animation: fadeUp 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .notifications-toast .toast.discord { border-color: rgba(88, 101, 242, 0.6); }
    .notifications-toast .toast.proactive { border-color: rgba(80, 200, 120, 0.6); }
    .notifications-toast .toast .toast-title { color: #a0c8ff; font-weight: 600; margin-bottom: 0.25rem; }
    .notifications-toast .toast .toast-body { color: #c0d8f0; }
    @media (max-width: 600px) {
      .input-row, .voice-row { max-width: 100%; padding-left: 0.5rem; padding-right: 0.5rem; }
      .chat-bar { padding: 0.75rem 0.75rem max(1rem, env(safe-area-inset-bottom)); }
      .msg { max-width: 95%; font-size: 0.85rem; }
      .centerpiece { width: min(280px, 90vw); height: min(280px, 90vw); }
      .toggles { flex-wrap: wrap; }
      .memory-panel-header { padding: 0.5rem 1rem; }
      .memory-node-modal { inset: 8%; padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="notifications-toast" id="notificationsToast"></div>
  <div class="app">
    <div class="centerpiece" aria-hidden="true">
      <div class="atom">
        <div class="nucleus"></div>
        <div class="orbit orbit-1"><div class="electron"></div></div>
        <div class="orbit orbit-2"><div class="electron"></div><div class="electron"></div></div>
        <div class="orbit orbit-3"><div class="electron"></div><div class="electron"></div></div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="memory-panel" id="memoryPanel">
      <div class="memory-panel-header">
        <h3>Knowledge graph</h3>
        <button class="memory-panel-close" id="memoryPanelClose">Close</button>
      </div>
      <div id="memoryGraphContainer"></div>
    </div>
    <div class="memory-node-modal" id="memoryNodeModal">
      <h4 id="memoryNodeModalTitle">Node</h4>
      <div class="content" id="memoryNodeModalContent"></div>
      <button class="close-btn" id="memoryNodeModalClose">Close</button>
    </div>
    <div class="tools-panel" id="toolsPanel">
      <h4>Suggested (approve to queue)</h4>
      <div id="toolsSuggested"></div>
      <h4>Approved (implement in chat)</h4>
      <div id="toolsApproved"></div>
      <h4>Implemented</h4>
      <div id="toolsImplemented"></div>
      <button class="reload-btn" id="btnReloadTools">Reload tools</button>
      <button class="reload-btn" id="btnStopSubagents" style="margin-left:0.5rem">Stop all sub-agents</button>
      <button class="reload-btn" id="btnSuggestTools" style="margin-left:0.5rem">Suggest tools</button>
      <button class="reload-btn" id="btnImplementTools" style="margin-left:0.5rem">Implement approved tools</button>
    </div>

    <div class="chat-bar">
      <div class="input-row">
        <input type="text" id="textInput" placeholder="Type or use voice..." autocomplete="off" />
        <button class="btn btn-send" id="btnTypeSend">Send</button>
      </div>
      <div class="voice-row">
        <button class="btn btn-record" id="btnRecord">Record</button>
        <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
        <button class="btn btn-send" id="btnSend" disabled>Send</button>
        <span class="status" id="status">Ready</span>
      </div>
      <div class="toggles">
        <div class="toggle-row">
          <div class="toggle on" id="toggleTTS"></div>
          <span>Speak</span>
        </div>
        <div class="toggle-row">
          <div class="toggle on" id="toggleListen"></div>
          <span>Listen</span>
        </div>
        <span class="tools-toggle" id="toolsToggle">Tools</span>
        <span class="memory-toggle" id="memoryToggle">Memory & Knowledge</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/standalone/umd/vis-network.min.js"></script>
  <script>
    const messages = document.getElementById('messages');
    const btnRecord = document.getElementById('btnRecord');
    const btnStop = document.getElementById('btnStop');
    const btnSend = document.getElementById('btnSend');
    const status = document.getElementById('status');
    const textInput = document.getElementById('textInput');
    const btnTypeSend = document.getElementById('btnTypeSend');
    const toggleTTS = document.getElementById('toggleTTS');
    const toggleListen = document.getElementById('toggleListen');

    let mediaRecorder = null;
    let audioChunks = [];
    let speakResponses = true;
    let listening = true;

    toggleTTS.addEventListener('click', () => {
      speakResponses = !speakResponses;
      toggleTTS.classList.toggle('on', speakResponses);
    });
    toggleListen.addEventListener('click', () => {
      listening = !listening;
      toggleListen.classList.toggle('on', listening);
    });

    function addToLog(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'agent' && typeof marked !== 'undefined') {
        div.innerHTML = marked.parse(text || '');
      } else {
        div.textContent = (role === 'user' ? 'You: ' : '') + text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function setStatus(s) { status.textContent = s; }
    function setLoading(loading) {
      btnTypeSend.disabled = loading;
      btnSend.disabled = loading || audioChunks.length === 0;
    }

    btnRecord.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => { if (e.data.size) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          setStatus('Stopped. Click Send.');
          btnRecord.disabled = false;
          btnStop.disabled = true;
          document.getElementById('btnSend').disabled = false;
        };

        mediaRecorder.start();
        btnRecord.classList.add('recording');
        btnRecord.disabled = true;
        btnStop.disabled = false;
        setStatus('Recording...');
      } catch (err) {
        setStatus('Mic denied');
      }
    });

    btnStop.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        btnRecord.classList.remove('recording');
      }
    });

    btnSend.addEventListener('click', async () => {
      if (audioChunks.length === 0) { setStatus('No recording'); return; }
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      setStatus('Transcribing...');
      setLoading(true);
      try {
        const fd = new FormData();
        fd.append('audio', blob);
        const r = await fetch('/api/transcribe', { method: 'POST', body: fd });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Transcription failed');
        const text = data.text || '';
        if (!text.trim()) { setStatus('No speech'); setLoading(false); return; }
        addToLog('user', text);
        setStatus('Sending...');
        await sendToAgent(text);
      } catch (err) {
        setStatus('Error: ' + err.message);
      } finally {
        setLoading(false);
        audioChunks = [];
        btnSend.disabled = true;
      }
    });

    async function sendToAgent(message) {
      setLoading(true);
      setStatus('Thinking...');

      const narrationDiv = document.createElement('div');
      narrationDiv.className = 'narration';
      messages.appendChild(narrationDiv);
      messages.scrollTop = messages.scrollHeight;

      function addNarrationLine(text) {
        const span = document.createElement('span');
        span.className = 'line';
        span.textContent = text;
        narrationDiv.appendChild(span);
        messages.scrollTop = messages.scrollHeight;
      }

      try {
        const fd = new FormData();
        fd.append('message', message);
        const r = await fetch('/api/chat', { method: 'POST', body: fd });
        if (!r.ok) {
          const errData = await r.json().catch(() => ({}));
          throw new Error(errData.error || 'Chat failed');
        }
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalResponse = '';

        function processEvent(line) {
          if (!line.startsWith('data: ')) return;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'narrate') addNarrationLine(ev.text || '');
            else if (ev.type === 'response') finalResponse = ev.text || '';
            else if (ev.type === 'error') throw new Error(ev.text || 'Unknown error');
          } catch (e) {
            if (!(e instanceof SyntaxError)) throw e;
          }
        }

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split('\n\n');
          buffer = events.pop() || '';
          for (const event of events) {
            const line = event.split('\n')[0];
            if (line) processEvent(line.trim());
          }
        }
        if (buffer.trim()) {
          const line = buffer.split('\n')[0];
          if (line) processEvent(line.trim());
        }

        narrationDiv.remove();
        addToLog('agent', finalResponse);
        setStatus('Ready');

        if (speakResponses && finalResponse) {
          setStatus('Speaking...');
          const s = await fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'text=' + encodeURIComponent(finalResponse)
          });
          const sa = await s.json();
          if (sa.audio) {
            const audio = new Audio(sa.audio);
            await audio.play();
          }
          setStatus('Ready');
        }
      } catch (err) {
        narrationDiv.remove();
        setStatus('Error: ' + err.message);
        addToLog('agent', 'Sorry, something went wrong. ' + err.message);
      } finally {
        setLoading(false);
      }
    }

    btnTypeSend.addEventListener('click', () => {
      const msg = textInput.value.trim();
      if (!msg) return;
      textInput.value = '';
      addToLog('user', msg);
      sendToAgent(msg);
    });

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnTypeSend.click();
    });

    const toolsToggle = document.getElementById('toolsToggle');
    const btnSuggestTools = document.getElementById('btnSuggestTools');
    const toolsPanel = document.getElementById('toolsPanel');
    const btnReloadTools = document.getElementById('btnReloadTools');

    toolsToggle.addEventListener('click', () => {
      toolsPanel.classList.toggle('open');
      memoryPanel.classList.remove('open');
      if (toolsPanel.classList.contains('open')) loadToolQueue();
    });

    const memoryToggle = document.getElementById('memoryToggle');
    const memoryPanel = document.getElementById('memoryPanel');
    const memoryPanelClose = document.getElementById('memoryPanelClose');
    const memoryNodeModal = document.getElementById('memoryNodeModal');
    const memoryNodeModalTitle = document.getElementById('memoryNodeModalTitle');
    const memoryNodeModalContent = document.getElementById('memoryNodeModalContent');
    const memoryNodeModalClose = document.getElementById('memoryNodeModalClose');

    memoryToggle.addEventListener('click', () => {
      memoryPanel.classList.toggle('open');
      toolsPanel.classList.remove('open');
      if (memoryPanel.classList.contains('open')) loadMemoryView();
    });
    memoryPanelClose.addEventListener('click', () => memoryPanel.classList.remove('open'));
    memoryNodeModalClose.addEventListener('click', () => memoryNodeModal.classList.remove('open'));
    memoryNodeModal.addEventListener('click', (e) => { if (e.target === memoryNodeModal) memoryNodeModal.classList.remove('open'); });

    let memoryNetwork = null;
    const nodeData = {};

    async function loadMemoryView() {
      const container = document.getElementById('memoryGraphContainer');
      container.innerHTML = '';
      if (typeof vis === 'undefined') {
        container.innerHTML = '<p style="color:#888;padding:2rem">Loading graph library...</p>';
        return;
      }
      try {
        const r = await fetch('/api/memory-view');
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed to load');

        const nodes = new vis.DataSet([]);
        const edges = new vis.DataSet([]);
        Object.keys(nodeData).forEach(k => delete nodeData[k]);

        const centerId = 'center';
        nodes.add({ id: centerId, label: 'Knowledge', level: 0, font: { size: 18 }, color: { background: '#3a5a8a', border: '#6a9ada' }, shape: 'dot', size: 28 });
        let edgeId = 0;

        const facts = data.profile?.facts || {};
        const cats = ['background', 'work', 'preferences', 'personal', 'other'];
        let profileCount = 0;
        const hubProfile = 'hub-profile';
        nodes.add({ id: hubProfile, label: 'Profile', level: 1, font: { size: 14 }, color: { background: '#4a3a6a', border: '#8a7aaa' }, shape: 'dot', size: 22 });
        edges.add({ id: edgeId++, from: centerId, to: hubProfile });
        for (const cat of cats) {
          for (const item of (facts[cat] || [])) {
            const id = 'p-' + profileCount++;
            const label = item.length > 24 ? item.slice(0, 22) + '…' : item;
            nodeData[id] = { title: cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), content: item };
            nodes.add({ id, label, level: 2, font: { size: 11 }, color: { background: '#3d4a6a', border: '#6a7aaa' }, shape: 'box' });
            edges.add({ id: edgeId++, from: hubProfile, to: id });
          }
        }
        if (profileCount === 0) {
          const id = 'p-empty';
          nodeData[id] = { title: 'Profile', content: 'No profile facts yet. Share about yourself.' };
          nodes.add({ id, label: 'Empty', level: 2, font: { size: 11 }, color: { background: '#2a2a3a', border: '#555' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubProfile, to: id });
        }

        const epis = data.episodic || [];
        const hubEpisodic = 'hub-episodic';
        nodes.add({ id: hubEpisodic, label: 'Memories', level: 1, font: { size: 14 }, color: { background: '#2a4a4a', border: '#5a8a8a' }, shape: 'dot', size: 22 });
        edges.add({ id: edgeId++, from: centerId, to: hubEpisodic });
        let prevEp = null;
        for (let i = 0; i < Math.min(epis.length, 50); i++) {
          const e = epis[epis.length - 1 - i];
          const id = 'e-' + i;
          const content = e.content || '';
          const label = content.length > 28 ? content.slice(0, 26) + '…' : content || '…';
          nodeData[id] = { title: 'Memory', content: content || '(empty)' };
          nodes.add({ id, label, level: 2, font: { size: 10 }, color: { background: '#2a3a4a', border: '#5a7a8a' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubEpisodic, to: id });
          if (prevEp) edges.add({ id: edgeId++, from: prevEp, to: id, dashes: true });
          prevEp = id;
        }
        if (epis.length === 0) {
          const id = 'e-empty';
          nodeData[id] = { title: 'Memories', content: 'No episodic memories yet.' };
          nodes.add({ id, label: 'Empty', level: 2, font: { size: 11 }, color: { background: '#2a2a3a', border: '#555' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubEpisodic, to: id });
        }

        const work = data.working || {};
        const workKeys = Object.keys(work);
        const hubWorking = 'hub-working';
        nodes.add({ id: hubWorking, label: 'Active task', level: 1, font: { size: 14 }, color: { background: '#4a4030', border: '#8a7a5a' }, shape: 'dot', size: 22 });
        edges.add({ id: edgeId++, from: centerId, to: hubWorking });
        workKeys.forEach((k, i) => {
          const id = 'w-' + i;
          const val = String(work[k]);
          const label = (k + ': ' + val).length > 24 ? (k + ': ' + val).slice(0, 22) + '…' : k + ': ' + val;
          nodeData[id] = { title: 'Task state', content: k + ': ' + val };
          nodes.add({ id, label, level: 2, font: { size: 10 }, color: { background: '#3a3528', border: '#6a5a4a' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubWorking, to: id });
        });
        if (workKeys.length === 0) {
          const id = 'w-empty';
          nodeData[id] = { title: 'Task state', content: 'No active task state.' };
          nodes.add({ id, label: 'Empty', level: 2, font: { size: 11 }, color: { background: '#2a2a3a', border: '#555' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubWorking, to: id });
        }

        const thoughts = data.thoughts || [];
        const hubThoughts = 'hub-thoughts';
        nodes.add({ id: hubThoughts, label: 'Background thoughts', level: 1, font: { size: 14 }, color: { background: '#3a4a3a', border: '#6a8a6a' }, shape: 'dot', size: 22 });
        edges.add({ id: edgeId++, from: centerId, to: hubThoughts });
        for (let i = 0; i < Math.min(thoughts.length, 20); i++) {
          const t = thoughts[i];
          const id = 't-' + i;
          const content = t.content || '';
          const label = content.length > 28 ? content.slice(0, 26) + '…' : content || '…';
          nodeData[id] = { title: 'Thought', content: content };
          nodes.add({ id, label, level: 2, font: { size: 10 }, color: { background: '#2a3a35', border: '#5a7a6a' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubThoughts, to: id });
        }
        if (thoughts.length === 0) {
          const id = 't-empty';
          nodeData[id] = { title: 'Thoughts', content: 'No background thoughts yet. Spawn background_thoughts.py to start.' };
          nodes.add({ id, label: 'Empty', level: 2, font: { size: 11 }, color: { background: '#2a2a3a', border: '#555' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubThoughts, to: id });
        }

        const bio = data.biology || {};
        const drives = bio.drives || {};
        const hubBio = 'hub-biology';
        nodes.add({ id: hubBio, label: 'Drives', level: 1, font: { size: 14 }, color: { background: '#4a2a4a', border: '#8a5a8a' }, shape: 'dot', size: 22 });
        edges.add({ id: edgeId++, from: centerId, to: hubBio });
        ['connection', 'curiosity', 'usefulness', 'expression'].forEach((d, i) => {
          const v = (drives[d] ?? 0).toFixed(2);
          const id = 'b-' + i;
          const label = d + ': ' + v;
          const pct = Math.round((drives[d] ?? 0) * 100);
          nodeData[id] = { title: 'Drive', content: d + ': ' + v + ' (' + pct + '%). ' + (bio.should_proactive ? 'Proactive ready.' : 'Accumulating.') };
          nodes.add({ id, label, level: 2, font: { size: 10 }, color: { background: '#3a2a3a', border: '#6a4a6a' }, shape: 'box' });
          edges.add({ id: edgeId++, from: hubBio, to: id });
        });

        const netData = { nodes, edges };
        const opts = {
          nodes: { font: { color: '#c0d8f0' } },
          edges: { color: { color: 'rgba(100,160,255,0.5)' }, width: 1.5 },
          layout: {
            hierarchical: {
              direction: 'UD',
              sortMethod: 'directed',
              levelSeparation: 100,
              nodeSpacing: 120,
              treeSpacing: 150,
              blockShifting: true
            }
          },
          physics: { enabled: false },
          interaction: { zoomView: true, dragView: true }
        };
        memoryNetwork = new vis.Network(container, netData, opts);
        memoryNetwork.on('click', function(params) {
          const id = params.nodes[0];
          if (id && nodeData[id]) {
            const d = nodeData[id];
            memoryNodeModalTitle.textContent = d.title;
            memoryNodeModalContent.textContent = d.content;
            memoryNodeModal.classList.add('open');
          }
        });
      } catch (err) {
        container.innerHTML = '<p style="color:#c66;padding:2rem">Error: ' + escapeHtml(err.message) + '</p>';
      }
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadToolQueue() {
      try {
        const r = await fetch('/api/tool-queue');
        const q = await r.json();
        renderToolList('toolsSuggested', q.suggested || [], true);
        renderToolList('toolsApproved', q.approved || [], false);
        renderToolList('toolsImplemented', q.implemented || [], false, true);
      } catch (e) {
        document.getElementById('toolsSuggested').innerHTML = '<span style="color:#666">Load failed</span>';
      }
    }

    function renderToolList(id, items, showApprove, isImpl) {
      const el = document.getElementById(id);
      if (!items.length) {
        el.innerHTML = '<span style="color:#666">None</span>';
        return;
      }
      el.innerHTML = items.map(t => {
        const name = t.name || t.id || '?';
        const desc = (t.description || t.reason || '').slice(0, 50);
        if (isImpl) {
          return `<div class="tool-item"><span>${name}: ${desc}</span></div>`;
        }
        if (showApprove) {
          return `<div class="tool-item"><span>${name}: ${desc}</span><div class="tool-btns"><button onclick="approveTool('${t.id}')">Approve</button><button class="reject" onclick="rejectTool('${t.id}')">Reject</button></div></div>`;
        }
        return `<div class="tool-item"><span>${name}: ${desc}</span></div>`;
      }).join('');
    }

    window.approveTool = async (id) => {
      const fd = new FormData();
      fd.append('tool_id', id);
      await fetch('/api/tool-approve', { method: 'POST', body: fd });
      loadToolQueue();
    };

    window.rejectTool = async (id) => {
      const fd = new FormData();
      fd.append('tool_id', id);
      await fetch('/api/tool-reject', { method: 'POST', body: fd });
      loadToolQueue();
    };

    btnSuggestTools.addEventListener('click', () => {
      textInput.value = 'Analyze the codebase and suggest any new tools we might need. What gaps do we have?';
      textInput.focus();
    });

    const btnImplementTools = document.getElementById('btnImplementTools');
    btnImplementTools.addEventListener('click', () => {
      textInput.value = 'Implement all approved tools in the queue. Check get_tool_queue, then write each tool to src/tools/dynamic/ and call mark_tool_implemented for each.';
      textInput.focus();
    });

    btnReloadTools.addEventListener('click', async () => {
      await fetch('/api/tool-reload', { method: 'POST' });
      btnReloadTools.textContent = 'Reloaded';
      setTimeout(() => { btnReloadTools.textContent = 'Reload tools'; }, 1500);
    });
    const btnStopSubagents = document.getElementById('btnStopSubagents');
    btnStopSubagents.addEventListener('click', async () => {
      const r = await fetch('/api/subagents-stop-all', { method: 'POST' });
      const d = await r.json();
      btnStopSubagents.textContent = d.result || 'Done';
      setTimeout(() => { btnStopSubagents.textContent = 'Stop all sub-agents'; }, 2000);
    });

    // Notifications SSE: Discord messages, proactive outreach
    function showToast(ev) {
      const container = document.getElementById('notificationsToast');
      const div = document.createElement('div');
      div.className = 'toast ' + (ev.type || '');
      div.innerHTML = '<div class="toast-title">' + escapeHtml(ev.title || 'Notification') + '</div><div class="toast-body">' + escapeHtml(ev.body || '') + '</div>';
      container.appendChild(div);
      setTimeout(() => div.remove(), 8000);
    }
    (function connectNotifications() {
      const es = new EventSource('/api/notifications/stream');
      es.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'ping') return;
          showToast(d);
          try {
            if (typeof Notification !== 'undefined' && Notification.permission === 'granted' && d.type === 'discord_message')
              new Notification(d.title || 'Discord', { body: (d.body || '').slice(0, 200) });
          } catch (_) {}
        } catch (_) {}
      };
      es.onerror = () => { es.close(); setTimeout(connectNotifications, 5000); };
      try { if (typeof Notification !== 'undefined' && Notification.permission === 'default') Notification.requestPermission(); } catch (_) {}
    })();
  </script>
</body>
