<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Software Lifeform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      height: 100dvh;
      background: #000;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Atom centerpiece */
    .centerpiece {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(360px, 85vw);
      height: min(360px, 85vw);
      perspective: 750px;
      pointer-events: none;
      z-index: 0;
    }

    .atom {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: atomSpin 24s linear infinite;
    }

    /* Nucleus (protons) */
    .nucleus {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 36px;
      height: 36px;
      margin: -18px 0 0 -18px;
      background: radial-gradient(circle at 30% 30%, rgba(200, 220, 255, 0.95), rgba(80, 120, 200, 0.8));
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(100, 160, 255, 0.7), 0 0 40px rgba(80, 120, 255, 0.4);
      animation: nucleusPulse 2.5s ease-in-out infinite;
    }

    /* Orbital rings (electron shells) */
    .orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 50%;
      transform-style: preserve-3d;
    }

    .orbit-1 {
      width: 180px;
      height: 180px;
      margin: -90px 0 0 -90px;
      transform: rotateX(70deg) rotateZ(0deg);
      animation: orbitRotate1 8s linear infinite;
    }

    .orbit-2 {
      width: 255px;
      height: 255px;
      margin: -128px 0 0 -128px;
      transform: rotateY(60deg) rotateX(70deg) rotateZ(0deg);
      border-color: rgba(150, 120, 255, 0.35);
      animation: orbitRotate2 12s linear infinite reverse;
    }

    .orbit-3 {
      width: 300px;
      height: 300px;
      margin: -150px 0 0 -150px;
      transform: rotateY(120deg) rotateX(70deg) rotateZ(0deg);
      border-color: rgba(100, 220, 200, 0.3);
      animation: orbitRotate3 16s linear infinite;
    }

    /* Electrons */
    .electron {
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, rgba(150, 220, 255, 1), rgba(80, 150, 255, 0.8));
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(100, 200, 255, 0.9), 0 0 36px rgba(80, 180, 255, 0.5);
      top: -6px;
      left: 50%;
      margin-left: -6px;
    }

    .orbit-2 .electron {
      width: 9px;
      height: 9px;
      margin-left: -5px;
      top: -5px;
      background: radial-gradient(circle, rgba(180, 150, 255, 1), rgba(120, 100, 200, 0.8));
      box-shadow: 0 0 10px rgba(150, 120, 255, 0.8);
    }

    .orbit-3 .electron {
      width: 9px;
      height: 9px;
      margin-left: -5px;
      top: -5px;
      background: radial-gradient(circle, rgba(100, 255, 220, 1), rgba(80, 200, 180, 0.8));
      box-shadow: 0 0 10px rgba(100, 220, 200, 0.8);
    }

    .orbit-2 .electron:nth-child(2) {
      top: auto;
      bottom: -5px;
      left: 50%;
      margin-left: -5px;
    }

    .orbit-3 .electron:nth-child(2) {
      top: auto;
      bottom: -5px;
      left: 50%;
      margin-left: -5px;
    }

    @keyframes atomSpin {
      from { transform: rotateY(0deg) rotateX(10deg); }
      to { transform: rotateY(360deg) rotateX(10deg); }
    }

    @keyframes orbitRotate1 {
      from { transform: rotateX(70deg) rotateZ(0deg); }
      to { transform: rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes orbitRotate2 {
      from { transform: rotateY(60deg) rotateX(70deg) rotateZ(0deg); }
      to { transform: rotateY(60deg) rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes orbitRotate3 {
      from { transform: rotateY(120deg) rotateX(70deg) rotateZ(0deg); }
      to { transform: rotateY(120deg) rotateX(70deg) rotateZ(360deg); }
    }

    @keyframes nucleusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.95; transform: scale(1.08); }
    }

    /* Messages - grow up from bottom */
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: scroll;
      padding: 2rem 1.5rem 1rem;
      padding-top: max(1rem, env(safe-area-inset-top));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 1rem;
      z-index: 1;
    }

    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(60, 60, 80, 0.8);
      border: 1px solid rgba(100, 150, 255, 0.3);
    }

    .msg.agent {
      align-self: flex-start;
      background: rgba(30, 50, 80, 0.6);
      border: 1px solid rgba(100, 200, 255, 0.2);
      color: #c0d8ff;
    }

    .narration {
      align-self: flex-start;
      max-width: 85%;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.6;
      background: rgba(20, 40, 60, 0.7);
      border: 1px solid rgba(80, 160, 255, 0.25);
      color: #90b8e8;
      font-family: inherit;
    }
    .narration .line {
      display: block;
      animation: fadeUp 0.25s ease;
    }

    .msg table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.85rem;
      margin: 0.5rem 0;
    }
    .msg th, .msg td {
      border: 1px solid rgba(100, 160, 255, 0.3);
      padding: 0.4rem 0.6rem;
      text-align: left;
    }
    .msg th {
      background: rgba(0, 40, 80, 0.5);
      font-weight: 600;
    }
    .msg tr:nth-child(even) { background: rgba(0, 20, 40, 0.2); }
    .msg h1, .msg h2, .msg h3 { margin: 0.75rem 0 0.25rem; }
    .msg ul, .msg ol { margin: 0.5rem 0; padding-left: 1.5rem; }

    /* Chat bar - fixed at bottom */
    .chat-bar {
      position: relative;
      z-index: 2;
      padding: 1rem 1.5rem 1.5rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .input-row input {
      flex: 1;
      background: rgba(20, 20, 30, 0.9);
      border: 1px solid rgba(80, 100, 140, 0.5);
      border-radius: 24px;
      padding: 0.85rem 1.25rem;
      min-height: 44px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 16px;
    }
    .input-row input:focus {
      outline: none;
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.1);
    }
    .input-row input::placeholder { color: #666; }

    .btn {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      min-height: 44px;
      min-width: 44px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-send {
      background: rgba(80, 140, 255, 0.4);
      color: #b0d0ff;
      border: 1px solid rgba(100, 160, 255, 0.4);
    }
    .btn-send:hover { background: rgba(80, 140, 255, 0.6); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .voice-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.75rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      margin-top: 0.75rem;
    }

    .btn-record {
      background: rgba(180, 60, 60, 0.4);
      color: #ffa0a0;
      border: 1px solid rgba(200, 80, 80, 0.5);
    }
    .btn-record:hover { background: rgba(180, 60, 60, 0.6); }
    .btn-record.recording {
      background: rgba(200, 50, 50, 0.7);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .btn-stop {
      background: rgba(80, 80, 90, 0.6);
      color: #aaa;
    }
    .btn-stop:hover { background: rgba(90, 90, 100, 0.7); }

    .status {
      font-size: 0.75rem;
      color: #666;
      margin-left: 0.5rem;
    }

    .toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .toggles-break {
      flex-basis: 100%;
      width: 0;
      height: 0;
      overflow: hidden;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #666;
    }
    .toggle {
      width: 32px;
      height: 18px;
      background: rgba(60, 60, 80, 0.8);
      border-radius: 9px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle.on { background: rgba(80, 140, 255, 0.5); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(14px); }

    .tools-toggle, .memory-toggle {
      padding: 0.5rem 0.25rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    .tools-toggle {
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      margin-top: 0.5rem;
      text-decoration: underline;
    }
    .tools-toggle:hover { color: #999; }

    .tools-panel {
      display: none;
      background: rgba(10, 15, 25, 0.95);
      border: 1px solid rgba(80, 120, 180, 0.3);
      border-radius: 8px;
      padding: 1rem;
      margin: 0 1.5rem 1rem;
      max-height: 200px;
      overflow-y: auto;
      z-index: 3;
    }
    .tools-panel.open { display: block; }

    .tools-panel h4 {
      font-size: 0.8rem;
      color: #a0c0ff;
      margin-bottom: 0.5rem;
    }
    .tools-panel .tool-item {
      font-size: 0.8rem;
      padding: 0.4rem;
      background: rgba(0,20,40,0.5);
      border-radius: 4px;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .tools-panel .tool-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tools-panel .tool-btns { display: flex; gap: 0.3rem; }
    .tools-panel .tool-btns button {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(80,140,255,0.5);
      background: rgba(60,100,180,0.3);
      color: #a0c8ff;
      cursor: pointer;
    }
    .tools-panel .tool-btns button.reject { border-color: rgba(180,80,80,0.5); color: #ffa0a0; }
    .tools-panel .reload-btn {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      background: rgba(80,140,255,0.3);
      border: 1px solid rgba(100,160,255,0.4);
      color: #b0d0ff;
      border-radius: 4px;
      cursor: pointer;
    }

    .memory-toggle, .metrics-toggle {
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      margin-top: 0.5rem;
      margin-left: 1rem;
      text-decoration: underline;
    }
    .memory-toggle:hover, .metrics-toggle:hover { color: #999; }

    .metrics-panel {
      display: none;
      background: rgba(10, 15, 25, 0.95);
      border: 1px solid rgba(80, 120, 180, 0.3);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin: 0 1.5rem 1rem;
      max-height: 320px;
      overflow-y: auto;
      z-index: 3;
    }
    .metrics-panel.open { display: block; }
    .metrics-panel h4 {
      font-size: 0.85rem;
      color: #a0c0ff;
      margin: 1rem 0 0.5rem;
    }
    .metrics-panel h4:first-child { margin-top: 0; }
    .metric-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .metric-row label { min-width: 100px; font-size: 0.8rem; color: #a0c8ff; }
    .metric-bar-wrap {
      flex: 1;
      height: 12px;
      background: rgba(20, 40, 60, 0.8);
      border-radius: 6px;
      overflow: hidden;
    }
    .metric-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(80, 140, 255, 0.6), rgba(120, 180, 255, 0.8));
      transition: width 0.3s ease;
    }
    .metric-bar.high { background: linear-gradient(90deg, rgba(255, 160, 80, 0.6), rgba(255, 180, 100, 0.8)); }
    .metric-value { font-size: 0.75rem; color: #888; min-width: 3rem; }

    .settings-gear {
      width: 24px;
      height: 24px;
      padding: 0.25rem;
      margin-left: 0.5rem;
      cursor: pointer;
      opacity: 0.6;
      vertical-align: middle;
    }
    .settings-gear:hover { opacity: 1; }

    .settings-modal {
      display: none;
      position: fixed;
      inset: 20%;
      background: rgba(10, 20, 40, 0.98);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 12px;
      flex-direction: column;
      padding: 1.5rem;
      z-index: 200;
    }
    .settings-modal.open { display: flex; }
    .settings-modal h4 { color: #a0c8ff; font-size: 0.95rem; margin-bottom: 0.75rem; }
    .settings-modal label { font-size: 0.85rem; color: #90b0d0; display: block; margin-bottom: 0.25rem; }
    .settings-modal select {
      width: 100%;
      max-width: 400px;
      padding: 0.5rem;
      background: rgba(20, 40, 70, 0.8);
      border: 1px solid rgba(100, 160, 255, 0.4);
      border-radius: 6px;
      color: #c0d8ff;
      font-size: 0.85rem;
    }
    .settings-modal .settings-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .settings-modal .btn-save-settings {
      padding: 0.5rem 1rem;
      background: rgba(80, 160, 100, 0.4);
      border: 1px solid rgba(100, 200, 120, 0.5);
      color: #a0e0b0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .settings-modal .btn-save-settings:hover {
      background: rgba(80, 160, 100, 0.6);
    }
    .settings-modal .settings-feedback {
      font-size: 0.8rem;
      color: #80c090;
    }
    .settings-modal .close-btn {
      margin-top: 1rem;
      padding: 0.4rem 0.8rem;
      min-height: 44px;
      background: rgba(80, 140, 255, 0.3);
      border: 1px solid rgba(100, 160, 255, 0.5);
      color: #b0d0ff;
      border-radius: 8px;
      cursor: pointer;
    }

    .memory-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.98);
      z-index: 100;
      flex-direction: column;
    }
    .memory-panel.open {
      display: flex;
    }
    .memory-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid rgba(100, 180, 255, 0.2);
      flex-shrink: 0;
    }
    .memory-panel-header h3 {
      font-size: 1rem;
      color: #a0c8ff;
      margin: 0;
    }
    .memory-panel-close {
      background: rgba(80, 100, 140, 0.4);
      border: 1px solid rgba(100, 160, 255, 0.3);
      color: #b0d0ff;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
    }
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem 0;
    }
    .tag-cloud .cloud-tag {
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid transparent;
    }
    .tag-cloud .cloud-tag:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(100, 180, 255, 0.4);
    }
    .cloud-section {
      margin-bottom: 1.25rem;
    }
    .cloud-section h5 {
      font-size: 0.8rem;
      color: #6a9ada;
      margin-bottom: 0.5rem;
    }

    .memory-panel-close:hover {
      background: rgba(80, 100, 140, 0.6);
    }
    #memoryGraphContainer {
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .memory-node-modal {
      display: none;
      position: fixed;
      inset: 20%;
      background: rgba(15, 25, 45, 0.98);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      z-index: 101;
      overflow: hidden;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(0, 80, 180, 0.3);
    }
    .memory-node-modal.open {
      display: flex;
    }
    .memory-node-modal h4 {
      color: #a0c8ff;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }
    .memory-node-modal .content {
      flex: 1;
      overflow-y: auto;
      color: #c0d8f0;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .memory-node-modal .close-btn {
      margin-top: 1rem;
      padding: 0.4rem 0.8rem;
      min-height: 44px;
      background: rgba(80, 140, 255, 0.3);
      border: 1px solid rgba(100, 160, 255, 0.4);
      color: #b0d0ff;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      align-self: flex-start;
    }
    .notifications-toast {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      right: 1rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 340px;
    }
    .notifications-toast .toast {
      background: rgba(15, 25, 45, 0.98);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      animation: fadeUp 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .notifications-toast .toast.discord { border-color: rgba(88, 101, 242, 0.6); }
    .notifications-toast .toast.proactive { border-color: rgba(80, 200, 120, 0.6); }
    .notifications-toast .toast .toast-title { color: #a0c8ff; font-weight: 600; margin-bottom: 0.25rem; }
    .notifications-toast .toast .toast-body { color: #c0d8f0; }
    @media (max-width: 600px) {
      .input-row, .voice-row { max-width: 100%; padding-left: 0.5rem; padding-right: 0.5rem; }
      .chat-bar { padding: 0.75rem 0.75rem max(1rem, env(safe-area-inset-bottom)); }
      .msg { max-width: 95%; font-size: 0.85rem; }
      .centerpiece { width: min(280px, 90vw); height: min(280px, 90vw); }
      .toggles { flex-wrap: wrap; }
      .memory-panel-header { padding: 0.5rem 1rem; }
      .memory-node-modal { inset: 8%; padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="notifications-toast" id="notificationsToast"></div>
  <div class="app">
    <div class="centerpiece" aria-hidden="true">
      <div class="atom">
        <div class="nucleus"></div>
        <div class="orbit orbit-1"><div class="electron"></div></div>
        <div class="orbit orbit-2"><div class="electron"></div><div class="electron"></div></div>
        <div class="orbit orbit-3"><div class="electron"></div><div class="electron"></div></div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="metrics-panel" id="metricsPanel">
      <h4>Internal metrics</h4>
      <div id="metricsContent"></div>
    </div>
    <div class="memory-panel" id="memoryPanel">
      <div class="memory-panel-header">
        <h3>Memory & knowledge</h3>
        <button class="memory-panel-close" id="memoryPanelClose">Close</button>
      </div>
      <div id="memoryGraphContainer" class="memory-clouds"></div>
    </div>
    <div class="memory-node-modal" id="memoryNodeModal">
      <h4 id="memoryNodeModalTitle">Node</h4>
      <div class="content" id="memoryNodeModalContent"></div>
      <button class="close-btn" id="memoryNodeModalClose">Close</button>
    </div>
    <div class="tools-panel" id="toolsPanel">
      <h4>Suggested (approve to queue)</h4>
      <div id="toolsSuggested"></div>
      <h4>Approved (implement in chat)</h4>
      <div id="toolsApproved"></div>
      <h4>Implemented</h4>
      <div id="toolsImplemented"></div>
      <button class="reload-btn" id="btnReloadTools">Reload tools</button>
      <button class="reload-btn" id="btnStopSubagents" style="margin-left:0.5rem">Stop all sub-agents</button>
      <button class="reload-btn" id="btnSuggestTools" style="margin-left:0.5rem">Suggest tools</button>
      <button class="reload-btn" id="btnImplementTools" style="margin-left:0.5rem">Implement approved tools</button>
    </div>

    <div class="chat-bar">
      <div class="input-row">
        <input type="text" id="textInput" placeholder="Type or use voice..." autocomplete="off" />
        <button class="btn btn-send" id="btnTypeSend">Send</button>
      </div>
      <div class="voice-row">
        <button class="btn btn-record" id="btnRecord">Record</button>
        <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
        <button class="btn btn-send" id="btnSend" disabled>Send</button>
        <span class="status" id="status">Ready</span>
      </div>
      <div class="toggles">
        <div class="toggle-row">
          <div class="toggle on" id="toggleTTS"></div>
          <span>Speak</span>
        </div>
        <div class="toggle-row">
          <div class="toggle on" id="toggleListen"></div>
          <span>Listen</span>
        </div>
        <span class="tools-toggle" id="toolsToggle">Tools</span>
        <span class="toggles-break" aria-hidden="true"></span>
        <span class="metrics-toggle" id="metricsToggle">Metrics</span>
        <span class="memory-toggle" id="memoryToggle">Memory & Knowledge</span>
        <svg class="settings-gear" id="settingsGear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </div>
    </div>
    <div class="settings-modal" id="settingsModal">
      <h4>Settings</h4>
      <label for="voiceSelect">Voice (TTS)</label>
      <select id="voiceSelect">
        <option value="">Loading...</option>
      </select>
      <div class="settings-actions">
        <button class="btn-save-settings" id="btnSaveSettings">Save</button>
        <span class="settings-feedback" id="settingsFeedback"></span>
      </div>
      <button class="close-btn" id="settingsModalClose" style="margin-top:1rem">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const messages = document.getElementById('messages');
    const btnRecord = document.getElementById('btnRecord');
    const btnStop = document.getElementById('btnStop');
    const btnSend = document.getElementById('btnSend');
    const status = document.getElementById('status');
    const textInput = document.getElementById('textInput');
    const btnTypeSend = document.getElementById('btnTypeSend');
    const toggleTTS = document.getElementById('toggleTTS');
    const toggleListen = document.getElementById('toggleListen');

    let mediaRecorder = null;
    let audioChunks = [];
    let speakResponses = true;
    let listening = true;

    toggleTTS.addEventListener('click', () => {
      speakResponses = !speakResponses;
      toggleTTS.classList.toggle('on', speakResponses);
    });
    toggleListen.addEventListener('click', () => {
      listening = !listening;
      toggleListen.classList.toggle('on', listening);
    });

    function addToLog(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'agent' && typeof marked !== 'undefined') {
        div.innerHTML = marked.parse(text || '');
      } else {
        div.textContent = (role === 'user' ? 'You: ' : '') + text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function setStatus(s) { status.textContent = s; }
    function setLoading(loading) {
      btnTypeSend.disabled = loading;
      btnSend.disabled = loading || audioChunks.length === 0;
    }

    btnRecord.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => { if (e.data.size) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          setStatus('Stopped. Click Send.');
          btnRecord.disabled = false;
          btnStop.disabled = true;
          document.getElementById('btnSend').disabled = false;
        };

        mediaRecorder.start();
        btnRecord.classList.add('recording');
        btnRecord.disabled = true;
        btnStop.disabled = false;
        setStatus('Recording...');
      } catch (err) {
        setStatus('Mic denied');
      }
    });

    btnStop.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        btnRecord.classList.remove('recording');
      }
    });

    btnSend.addEventListener('click', async () => {
      if (audioChunks.length === 0) { setStatus('No recording'); return; }
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      setStatus('Transcribing...');
      setLoading(true);
      try {
        const fd = new FormData();
        fd.append('audio', blob);
        const r = await fetch('/api/transcribe', { method: 'POST', body: fd });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Transcription failed');
        const text = data.text || '';
        if (!text.trim()) { setStatus('No speech'); setLoading(false); return; }
        addToLog('user', text);
        setStatus('Sending...');
        await sendToAgent(text);
      } catch (err) {
        setStatus('Error: ' + err.message);
      } finally {
        setLoading(false);
        audioChunks = [];
        btnSend.disabled = true;
      }
    });

    async function sendToAgent(message) {
      setLoading(true);
      setStatus('Thinking...');

      const narrationDiv = document.createElement('div');
      narrationDiv.className = 'narration';
      messages.appendChild(narrationDiv);
      messages.scrollTop = messages.scrollHeight;

      function addNarrationLine(text) {
        const span = document.createElement('span');
        span.className = 'line';
        span.textContent = text;
        narrationDiv.appendChild(span);
        messages.scrollTop = messages.scrollHeight;
      }

      try {
        const fd = new FormData();
        fd.append('message', message);
        const r = await fetch('/api/chat', { method: 'POST', body: fd });
        if (!r.ok) {
          const errData = await r.json().catch(() => ({}));
          throw new Error(errData.error || 'Chat failed');
        }
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalResponse = '';

        function processEvent(line) {
          if (!line.startsWith('data: ')) return;
          try {
            const ev = JSON.parse(line.slice(6));
            if (ev.type === 'narrate') addNarrationLine(ev.text || '');
            else if (ev.type === 'response') finalResponse = ev.text || '';
            else if (ev.type === 'error') throw new Error(ev.text || 'Unknown error');
          } catch (e) {
            if (!(e instanceof SyntaxError)) throw e;
          }
        }

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split('\n\n');
          buffer = events.pop() || '';
          for (const event of events) {
            const line = event.split('\n')[0];
            if (line) processEvent(line.trim());
          }
        }
        if (buffer.trim()) {
          const line = buffer.split('\n')[0];
          if (line) processEvent(line.trim());
        }

        narrationDiv.remove();
        addToLog('agent', finalResponse);
        setStatus('Ready');

        if (speakResponses && finalResponse) {
          setStatus('Speaking...');
          const s = await fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'text=' + encodeURIComponent(finalResponse)
          });
          const sa = await s.json();
          if (sa.audio) {
            const audio = new Audio(sa.audio);
            await audio.play();
          }
          setStatus('Ready');
        }
      } catch (err) {
        narrationDiv.remove();
        setStatus('Error: ' + err.message);
        addToLog('agent', 'Sorry, something went wrong. ' + err.message);
      } finally {
        setLoading(false);
      }
    }

    btnTypeSend.addEventListener('click', () => {
      const msg = textInput.value.trim();
      if (!msg) return;
      textInput.value = '';
      addToLog('user', msg);
      sendToAgent(msg);
    });

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnTypeSend.click();
    });

    const toolsToggle = document.getElementById('toolsToggle');
    const btnSuggestTools = document.getElementById('btnSuggestTools');
    const toolsPanel = document.getElementById('toolsPanel');
    const btnReloadTools = document.getElementById('btnReloadTools');

    toolsToggle.addEventListener('click', () => {
      toolsPanel.classList.toggle('open');
      memoryPanel.classList.remove('open');
      metricsPanel.classList.remove('open');
      if (toolsPanel.classList.contains('open')) loadToolQueue();
    });

    const memoryToggle = document.getElementById('memoryToggle');
    const memoryPanel = document.getElementById('memoryPanel');
    const metricsPanel = document.getElementById('metricsPanel');
    const memoryPanelClose = document.getElementById('memoryPanelClose');
    const memoryNodeModal = document.getElementById('memoryNodeModal');
    const memoryNodeModalTitle = document.getElementById('memoryNodeModalTitle');
    const memoryNodeModalContent = document.getElementById('memoryNodeModalContent');
    const memoryNodeModalClose = document.getElementById('memoryNodeModalClose');

    const metricsToggle = document.getElementById('metricsToggle');
    metricsToggle.addEventListener('click', () => {
      metricsPanel.classList.toggle('open');
      toolsPanel.classList.remove('open');
      memoryPanel.classList.remove('open');
      if (metricsPanel.classList.contains('open')) loadMetricsView();
    });

    memoryToggle.addEventListener('click', () => {
      memoryPanel.classList.toggle('open');
      toolsPanel.classList.remove('open');
      metricsPanel.classList.remove('open');
      if (memoryPanel.classList.contains('open')) loadMemoryView();
    });
    memoryPanelClose.addEventListener('click', () => memoryPanel.classList.remove('open'));
    memoryNodeModalClose.addEventListener('click', () => memoryNodeModal.classList.remove('open'));
    memoryNodeModal.addEventListener('click', (e) => { if (e.target === memoryNodeModal) memoryNodeModal.classList.remove('open'); });

    const settingsGear = document.getElementById('settingsGear');
    const settingsModal = document.getElementById('settingsModal');
    const settingsModalClose = document.getElementById('settingsModalClose');
    const voiceSelect = document.getElementById('voiceSelect');

    function apiUrl(path) {
      return new URL(path, window.location.origin + window.location.pathname).href;
    }
    async function loadSettingsModal() {
      voiceSelect.innerHTML = '<option value="">Loading...</option>';
      try {
        const voicesUrl = apiUrl('api/voices');
        const settingsUrl = apiUrl('api/settings');
        const [voicesRes, settingsRes] = await Promise.all([fetch(voicesUrl), fetch(settingsUrl)]);
        if (!voicesRes.ok) throw new Error('Voices: ' + voicesRes.status);
        if (!settingsRes.ok) throw new Error('Settings: ' + settingsRes.status);
        const voicesData = await voicesRes.json();
        const settings = await settingsRes.json();
        const current = settings.tts_voice || '';
        const voices = voicesData.voices || [];
        voiceSelect.innerHTML = voices.map(v =>
          `<option value="${v.id}" ${v.id === current ? 'selected' : ''}>${v.name || v.id} (${v.gender || ''})</option>`
        ).join('');
      } catch (e) {
        voiceSelect.innerHTML = '<option value="">Error: ' + (e.message || 'Failed to load') + '</option>';
      }
    }

    settingsGear.addEventListener('click', async () => {
      settingsModal.classList.add('open');
      await loadSettingsModal();
    });
    settingsModalClose.addEventListener('click', () => settingsModal.classList.remove('open'));
    settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.remove('open'); });

    const btnSaveSettings = document.getElementById('btnSaveSettings');
    const settingsFeedback = document.getElementById('settingsFeedback');
    btnSaveSettings.addEventListener('click', async () => {
      const v = voiceSelect.value;
      if (!v) {
        settingsFeedback.textContent = 'Select a voice first';
        return;
      }
      settingsFeedback.textContent = '';
      try {
        const fd = new FormData();
        fd.append('tts_voice', v);
        const r = await fetch(apiUrl('api/settings'), { method: 'POST', body: fd });
        if (r.ok) {
          settingsFeedback.textContent = 'Saved.';
          setTimeout(() => { settingsFeedback.textContent = ''; }, 2000);
        } else {
          settingsFeedback.textContent = 'Save failed';
        }
      } catch (e) {
        settingsFeedback.textContent = 'Error: ' + (e.message || 'Save failed');
      }
    });

    async function loadMetricsView() {
      const el = document.getElementById('metricsContent');
      el.innerHTML = '<p style="color:#888">Loading...</p>';
      try {
        const r = await fetch('/api/memory-view');
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed to load');

        const bio = data.biology || {};
        const drives = bio.drives || {};
        const usage = data.image_usage || {};
        const subagents = typeof data.subagents === 'string' ? data.subagents : (data.subagents || '—');

        let html = '';
        html += '<h4>Drives</h4>';
        ['connection', 'curiosity', 'usefulness', 'expression'].forEach(d => {
          const v = (drives[d] ?? 0) * 100;
          const high = v >= 65;
          html += `<div class="metric-row"><label>${d}</label><div class="metric-bar-wrap"><div class="metric-bar ${high ? 'high' : ''}" style="width:${Math.min(100,v)}%"></div></div><span class="metric-value">${Math.round(v)}%</span></div>`;
        });
        const today = usage.today ?? 0;
        const limit = usage.limit ?? 20;
        const pct = limit ? Math.min(100, (today / limit) * 100) : 0;
        html += '<h4>Image usage (today)</h4>';
        html += `<div class="metric-row"><label>Generated</label><div class="metric-bar-wrap"><div class="metric-bar ${pct >= 80 ? 'high' : ''}" style="width:${pct}%"></div></div><span class="metric-value">${today}/${limit}</span></div>`;
        html += '<h4>Sub-agents</h4>';
        html += `<pre style="font-size:0.75rem;color:#a0c8ff;white-space:pre-wrap;margin:0">${escapeHtml(subagents)}</pre>`;
        el.innerHTML = html;
      } catch (err) {
        el.innerHTML = '<p style="color:#c66">Error: ' + escapeHtml(err.message) + '</p>';
      }
    }

    function cloudTag(title, content, size) {
      const s = size || 1;
      const bg = { 1: 'rgba(80,140,255,0.2)', 2: 'rgba(100,160,255,0.25)', 3: 'rgba(120,180,255,0.3)' }[s] || 'rgba(80,140,255,0.2)';
      const border = 'rgba(100,180,255,0.4)';
      const el = document.createElement('span');
      el.className = 'cloud-tag';
      el.textContent = content.length > 36 ? content.slice(0, 34) + '…' : content || '—';
      el.style.background = bg;
      el.style.borderColor = border;
      el.style.fontSize = (0.7 + s * 0.1) + 'rem';
      el.dataset.title = title;
      el.dataset.content = content;
      el.addEventListener('click', () => {
        memoryNodeModalTitle.textContent = title;
        memoryNodeModalContent.textContent = content;
        memoryNodeModal.classList.add('open');
      });
      return el;
    }

    async function loadMemoryView() {
      const container = document.getElementById('memoryGraphContainer');
      container.innerHTML = '<p style="color:#888;padding:2rem">Loading…</p>';
      try {
        const r = await fetch('/api/memory-view');
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed to load');

        container.innerHTML = '';

        const facts = data.profile?.facts || {};
        const cats = ['background', 'work', 'preferences', 'personal', 'other'];
        const profileSection = document.createElement('div');
        profileSection.className = 'cloud-section';
        profileSection.innerHTML = '<h5>Profile</h5>';
        const profileCloud = document.createElement('div');
        profileCloud.className = 'tag-cloud';
        let hasProfile = false;
        for (const cat of cats) {
          for (const item of (facts[cat] || [])) {
            profileCloud.appendChild(cloudTag(cat.replace(/_/g, ' '), item, 1));
            hasProfile = true;
          }
        }
        if (!hasProfile) profileCloud.appendChild(cloudTag('Profile', 'No profile facts yet. Share about yourself.', 1));
        profileSection.appendChild(profileCloud);
        container.appendChild(profileSection);

        const epis = data.episodic || [];
        const memSection = document.createElement('div');
        memSection.className = 'cloud-section';
        memSection.innerHTML = '<h5>Memories</h5>';
        const memCloud = document.createElement('div');
        memCloud.className = 'tag-cloud';
        const recent = epis.slice(-50).reverse();
        recent.forEach((e, i) => {
          const c = e.content || '';
          memCloud.appendChild(cloudTag('Memory', c || '(empty)', i < 5 ? 2 : 1));
        });
        if (recent.length === 0) memCloud.appendChild(cloudTag('Memories', 'No episodic memories yet.', 1));
        memSection.appendChild(memCloud);
        container.appendChild(memSection);

        const work = data.working || {};
        const workKeys = Object.keys(work);
        const workSection = document.createElement('div');
        workSection.className = 'cloud-section';
        workSection.innerHTML = '<h5>Active task</h5>';
        const workCloud = document.createElement('div');
        workCloud.className = 'tag-cloud';
        workKeys.forEach(k => workCloud.appendChild(cloudTag('Task', k + ': ' + String(work[k]), 1)));
        if (workKeys.length === 0) workCloud.appendChild(cloudTag('Task', 'No active task state.', 1));
        workSection.appendChild(workCloud);
        container.appendChild(workSection);

        const thoughts = data.thoughts || [];
        const thSection = document.createElement('div');
        thSection.className = 'cloud-section';
        thSection.innerHTML = '<h5>Background thoughts</h5>';
        const thCloud = document.createElement('div');
        thCloud.className = 'tag-cloud';
        thoughts.slice(0, 25).forEach((t, i) => thCloud.appendChild(cloudTag('Thought', t.content || '', i < 3 ? 2 : 1)));
        if (thoughts.length === 0) thCloud.appendChild(cloudTag('Thoughts', 'No background thoughts yet.', 1));
        thSection.appendChild(thCloud);
        container.appendChild(thSection);

        const bio = data.biology || {};
        const drives = bio.drives || {};
        const driveSection = document.createElement('div');
        driveSection.className = 'cloud-section';
        driveSection.innerHTML = '<h5>Drives</h5>';
        const driveCloud = document.createElement('div');
        driveCloud.className = 'tag-cloud';
        ['connection', 'curiosity', 'usefulness', 'expression'].forEach(d => {
          const v = ((drives[d] ?? 0) * 100).toFixed(0);
          driveCloud.appendChild(cloudTag('Drive', d + ': ' + v + '%', (drives[d] ?? 0) >= 0.65 ? 2 : 1));
        });
        driveSection.appendChild(driveCloud);
        container.appendChild(driveSection);
      } catch (err) {
        container.innerHTML = '<p style="color:#c66;padding:2rem">Error: ' + escapeHtml(err.message) + '</p>';
      }
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadToolQueue() {
      try {
        const r = await fetch('/api/tool-queue');
        const q = await r.json();
        renderToolList('toolsSuggested', q.suggested || [], true);
        renderToolList('toolsApproved', q.approved || [], false);
        renderToolList('toolsImplemented', q.implemented || [], false, true);
      } catch (e) {
        document.getElementById('toolsSuggested').innerHTML = '<span style="color:#666">Load failed</span>';
      }
    }

    function renderToolList(id, items, showApprove, isImpl) {
      const el = document.getElementById(id);
      if (!items.length) {
        el.innerHTML = '<span style="color:#666">None</span>';
        return;
      }
      el.innerHTML = items.map(t => {
        const name = t.name || t.id || '?';
        const desc = (t.description || t.reason || '').slice(0, 50);
        if (isImpl) {
          return `<div class="tool-item"><span>${name}: ${desc}</span></div>`;
        }
        if (showApprove) {
          return `<div class="tool-item"><span>${name}: ${desc}</span><div class="tool-btns"><button onclick="approveTool('${t.id}')">Approve</button><button class="reject" onclick="rejectTool('${t.id}')">Reject</button></div></div>`;
        }
        return `<div class="tool-item"><span>${name}: ${desc}</span></div>`;
      }).join('');
    }

    window.approveTool = async (id) => {
      const fd = new FormData();
      fd.append('tool_id', id);
      await fetch('/api/tool-approve', { method: 'POST', body: fd });
      loadToolQueue();
    };

    window.rejectTool = async (id) => {
      const fd = new FormData();
      fd.append('tool_id', id);
      await fetch('/api/tool-reject', { method: 'POST', body: fd });
      loadToolQueue();
    };

    btnSuggestTools.addEventListener('click', () => {
      textInput.value = 'Analyze the codebase and suggest any new tools we might need. What gaps do we have?';
      textInput.focus();
    });

    const btnImplementTools = document.getElementById('btnImplementTools');
    btnImplementTools.addEventListener('click', () => {
      textInput.value = 'Implement all approved tools in the queue. Check get_tool_queue, then write each tool to src/tools/dynamic/ and call mark_tool_implemented for each.';
      textInput.focus();
    });

    btnReloadTools.addEventListener('click', async () => {
      await fetch('/api/tool-reload', { method: 'POST' });
      btnReloadTools.textContent = 'Reloaded';
      setTimeout(() => { btnReloadTools.textContent = 'Reload tools'; }, 1500);
    });
    const btnStopSubagents = document.getElementById('btnStopSubagents');
    btnStopSubagents.addEventListener('click', async () => {
      const r = await fetch('/api/subagents-stop-all', { method: 'POST' });
      const d = await r.json();
      btnStopSubagents.textContent = d.result || 'Done';
      setTimeout(() => { btnStopSubagents.textContent = 'Stop all sub-agents'; }, 2000);
    });

    // Notifications SSE: Discord messages, proactive outreach
    function showToast(ev) {
      const container = document.getElementById('notificationsToast');
      const div = document.createElement('div');
      div.className = 'toast ' + (ev.type || '');
      div.innerHTML = '<div class="toast-title">' + escapeHtml(ev.title || 'Notification') + '</div><div class="toast-body">' + escapeHtml(ev.body || '') + '</div>';
      container.appendChild(div);
      setTimeout(() => div.remove(), 8000);
    }
    (function connectNotifications() {
      const es = new EventSource('/api/notifications/stream');
      es.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'ping') return;
          showToast(d);
          try {
            if (typeof Notification !== 'undefined' && Notification.permission === 'granted' && d.type === 'discord_message')
              new Notification(d.title || 'Discord', { body: (d.body || '').slice(0, 200) });
          } catch (_) {}
        } catch (_) {}
      };
      es.onerror = () => { es.close(); setTimeout(connectNotifications, 5000); };
      try { if (typeof Notification !== 'undefined' && Notification.permission === 'default') Notification.requestPermission(); } catch (_) {}
    })();
  </script>
</body>
</html>
